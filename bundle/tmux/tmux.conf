set-option -g prefix 'C-\'
set-option buffer-limit 1000
set-option -g history-limit 100000
set-option -g default-terminal xterm-256color
set -g status-interval 1
set -g base-index 1
set -sg escape-time 0
bind h set -g status
bind-key j command-prompt -p "send pane to:"  "join-pane -t '%%'"
bind-key e select-layout even-vertical
bind-key E select-layout even-horizontal
bind-key X setw synchronize-panes
set-window-option -g mode-keys vi
bind + copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down
unbind -T copy-mode-vi Enter

# Cross-platform clipboard: pbcopy on macOS, xclip/wl-copy on Linux.
# The render-time install picks the right one and writes a TMUX_CLIP env var.
if-shell '[ "$(uname -s)" = "Darwin" ]' \
  'bind-key -T copy-mode-vi Enter           send-keys -X copy-pipe-and-cancel "pbcopy"; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi Enter           send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"'

set-option -g lock-command vlock
set -g mouse on
bind m \
  set -g mouse on \;\
  display 'Mouse: ON'
bind M \
  set -g mouse off \;\
  display 'Mouse: OFF'
bind C send-keys "clear" c-m \; run-shell "sleep .3s" \; clear-history
bind G send-keys "git add . && git commit -m $(read -P 'message> ') && git push"
bind K send-keys "export KUBECONFIG=$HOME/.kube/config\t\t"
bind-key T command-prompt -p "send output of:"  'run-shell "/bin/bash -c \"tmux send-keys \\\"$(/bin/bash -c \"%%\")\\\"\""'
bind-key Ü run-shell "fish $HOME/bin/tmux_pass_menu.fish"
bind-key P display-popup -E "fish $HOME/bin/tmux_fzf_pass_menu.fish"
bind-key N display-popup -E "tmux new-session -A -s notes"
bind-key S display-popup -E "tmux new-session -A -s scratch"
bind-key J display-popup -E "fish"
bind-key L display-panes
bind-key U select-layout -o

source-file $HOME/.tmux-style.conf
