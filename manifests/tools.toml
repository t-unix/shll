# tools.toml — install matrix for shll v1.
#
# Schema: one [<tool>.<os>] table per (tool, OS) pair. Recognized OS keys are
# defined in lib/os-detect.md: macos, debian, ubuntu, arch, fedora, freebsd,
# openbsd, linux-other.
#
# Per-row keys:
#   check  — shell command that exits 0 if the tool is already installed.
#            Skill skips `cmd` when check passes.
#   cmd    — install command. Run via the user's shell with sudo as needed.
#            Multi-step setup belongs in `pre` / `post` arrays.
#   pre    — array of commands run before `cmd` (e.g. repo enable).
#   post   — array of commands run after `cmd` (e.g. shell-as-default).
#   action — set to "manual" with `url` when no automatic install is available.
#   url    — documentation link for manual installs.
#
# When a tool has no row for the detected OS, the skill falls back to the
# `[<tool>.linux-other]` row (or `[<tool>.manual]`) if present, else errors.

# ---------------------------------------------------------------------------
# wezterm
# ---------------------------------------------------------------------------

[wezterm.macos]
check = "command -v wezterm"
cmd   = "brew install --cask wezterm"

[wezterm.debian]
check = "command -v wezterm"
pre   = [
  "curl -fsSL https://apt.fury.io/wez/gpg.key | sudo gpg --yes --dearmor -o /usr/share/keyrings/wezterm-fury.gpg",
  "echo 'deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *' | sudo tee /etc/apt/sources.list.d/wezterm.list",
  "sudo apt-get update",
]
cmd   = "sudo apt-get install -y wezterm"

[wezterm.ubuntu]
check = "command -v wezterm"
pre   = [
  "curl -fsSL https://apt.fury.io/wez/gpg.key | sudo gpg --yes --dearmor -o /usr/share/keyrings/wezterm-fury.gpg",
  "echo 'deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *' | sudo tee /etc/apt/sources.list.d/wezterm.list",
  "sudo apt-get update",
]
cmd   = "sudo apt-get install -y wezterm"

[wezterm.arch]
check = "command -v wezterm"
cmd   = "sudo pacman -S --noconfirm wezterm"

[wezterm.fedora]
check = "command -v wezterm"
pre   = ["sudo dnf copr enable -y wezfurlong/wezterm-nightly"]
cmd   = "sudo dnf install -y wezterm"

[wezterm.freebsd]
check  = "command -v wezterm"
action = "manual"
url    = "https://wezterm.org/install/freebsd.html"

[wezterm.openbsd]
check  = "command -v wezterm"
action = "manual"
url    = "https://wezterm.org/install/linux.html#openbsd"

[wezterm.manual]
url = "https://wezterm.org/install/"

