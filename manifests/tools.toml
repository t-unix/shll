# ---------------------------------------------------------------------------
# fish
# ---------------------------------------------------------------------------

[fish.macos]
check = "command -v fish"
cmd   = "brew install fish"
post  = [
  "grep -qx \"$(brew --prefix)/bin/fish\" /etc/shells || (echo \"$(brew --prefix)/bin/fish\" | sudo tee -a /etc/shells)",
]

[fish.debian]
check = "command -v fish"
pre   = [
  "sudo apt-get install -y software-properties-common",
  "sudo apt-add-repository -y ppa:fish-shell/release-3 || true",
  "sudo apt-get update",
]
cmd   = "sudo apt-get install -y fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | sudo tee -a /etc/shells)',
]

[fish.ubuntu]
check = "command -v fish"
pre   = [
  "sudo apt-add-repository -y ppa:fish-shell/release-3",
  "sudo apt-get update",
]
cmd   = "sudo apt-get install -y fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | sudo tee -a /etc/shells)',
]

[fish.arch]
check = "command -v fish"
cmd   = "sudo pacman -S --noconfirm fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | sudo tee -a /etc/shells)',
]

[fish.fedora]
check = "command -v fish"
cmd   = "sudo dnf install -y fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | sudo tee -a /etc/shells)',
]

[fish.freebsd]
check = "command -v fish"
cmd   = "sudo pkg install -y fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | sudo tee -a /etc/shells)',
]

[fish.openbsd]
check = "command -v fish"
cmd   = "doas pkg_add fish"
post  = [
  'grep -qxF "$(command -v fish)" /etc/shells || (command -v fish | doas tee -a /etc/shells)',
]

