# ---------------------------------------------------------------------------
# neovim
# ---------------------------------------------------------------------------

[neovim.macos]
check = "command -v nvim"
cmd   = "brew install neovim"

# Debian 12 / Ubuntu 22.04 LTS ship nvim 0.7.x in apt, which lacks
# vim.fn.stdpath("state") (added in 0.8). The bundled init.lua needs >=0.8.
# Install the upstream stable release tarball into /opt and symlink.
[neovim.debian]
check = "test -x /usr/local/bin/nvim && /usr/local/bin/nvim --version | head -1 | grep -qE 'v(0\\.(1[0-9]|[89])|[1-9])'"
pre = [
  "sudo apt-get install -y curl",
  "sudo mkdir -p /opt",
  'curl -fsSL "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-$(uname -m | sed s/aarch64/arm64/).tar.gz" -o /tmp/nvim.tar.gz',
  "sudo tar -xzf /tmp/nvim.tar.gz -C /opt",
  "rm /tmp/nvim.tar.gz",
]
cmd = 'sudo ln -sf "/opt/nvim-linux-$(uname -m | sed s/aarch64/arm64/)/bin/nvim" /usr/local/bin/nvim'

[neovim.ubuntu]
check = "test -x /usr/local/bin/nvim && /usr/local/bin/nvim --version | head -1 | grep -qE 'v(0\\.(1[0-9]|[89])|[1-9])'"
pre = [
  "sudo apt-get install -y curl",
  "sudo mkdir -p /opt",
  'curl -fsSL "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-$(uname -m | sed s/aarch64/arm64/).tar.gz" -o /tmp/nvim.tar.gz',
  "sudo tar -xzf /tmp/nvim.tar.gz -C /opt",
  "rm /tmp/nvim.tar.gz",
]
cmd = 'sudo ln -sf "/opt/nvim-linux-$(uname -m | sed s/aarch64/arm64/)/bin/nvim" /usr/local/bin/nvim'

[neovim.arch]
check = "command -v nvim"
cmd   = "sudo pacman -S --noconfirm neovim"

[neovim.fedora]
check = "command -v nvim"
cmd   = "sudo dnf install -y neovim"

[neovim.freebsd]
check = "command -v nvim"
cmd   = "sudo pkg install -y neovim"

[neovim.openbsd]
check = "command -v nvim"
cmd   = "doas pkg_add neovim"

# ---------------------------------------------------------------------------
# build-tools — cc + make. Needed by lazy.nvim plugins that compile native
# code (nvim-treesitter parsers, LuaSnip jsregexp).
# ---------------------------------------------------------------------------

[build-tools.macos]
check = "command -v cc && command -v make && xcode-select -p >/dev/null 2>&1"
cmd   = "xcode-select --install || true"   # interactive GUI prompt; non-fatal

[build-tools.debian]
check = "command -v cc && command -v make"
cmd   = "sudo apt-get install -y build-essential"

[build-tools.ubuntu]
check = "command -v cc && command -v make"
cmd   = "sudo apt-get install -y build-essential"

[build-tools.arch]
check = "command -v cc && command -v make"
cmd   = "sudo pacman -S --noconfirm --needed base-devel"

[build-tools.fedora]
check = "command -v cc && command -v make"
cmd   = "sudo dnf groupinstall -y 'Development Tools'"

[build-tools.freebsd]
check = "command -v cc && command -v make"
cmd   = "true"   # base FreeBSD ships cc + make

[build-tools.openbsd]
check = "command -v cc && command -v make"
cmd   = "true"   # base OpenBSD ships cc + make

# ---------------------------------------------------------------------------
# bc — required by fish/lib/calcolor.fish (insh-theme color math).
# Ships on macOS by default; needs explicit install on most Linux distros.
# ---------------------------------------------------------------------------

[bc.macos]
check = "command -v bc"
cmd   = "true"  # system bc is always present on macOS

[bc.debian]
check = "command -v bc"
cmd   = "sudo apt-get install -y bc"

[bc.ubuntu]
check = "command -v bc"
cmd   = "sudo apt-get install -y bc"

[bc.arch]
check = "command -v bc"
cmd   = "sudo pacman -S --noconfirm bc"

[bc.fedora]
check = "command -v bc"
cmd   = "sudo dnf install -y bc"

[bc.freebsd]
check = "command -v bc"
cmd   = "true"  # bc is in base FreeBSD

[bc.openbsd]
check = "command -v bc"
cmd   = "true"  # bc is in base OpenBSD

# ---------------------------------------------------------------------------
# pass — needs gnupg as a dependency
# ---------------------------------------------------------------------------

[pass.macos]
check = "command -v pass && command -v gpg"
cmd   = "brew install pass gnupg"

[pass.debian]
check = "command -v pass && command -v gpg"
cmd   = "sudo apt-get install -y pass gnupg"

[pass.ubuntu]
check = "command -v pass && command -v gpg"
cmd   = "sudo apt-get install -y pass gnupg"

[pass.arch]
check = "command -v pass && command -v gpg"
cmd   = "sudo pacman -S --noconfirm pass gnupg"

[pass.fedora]
check = "command -v pass && command -v gpg"
cmd   = "sudo dnf install -y pass gnupg2"

[pass.freebsd]
check = "command -v pass && command -v gpg"
cmd   = "sudo pkg install -y password-store gnupg"

[pass.openbsd]
check = "command -v pass && command -v gpg"
cmd   = "doas pkg_add password-store gnupg"

# ---------------------------------------------------------------------------
# Optional: a fish-nerd-font for the prompt + terminal config
# ---------------------------------------------------------------------------

[nerd-font-sauce.macos]
check = "fc-list 2>/dev/null | grep -qi SauceCodePro || ls ~/Library/Fonts/SauceCodePro* >/dev/null 2>&1"
cmd   = "brew install --cask font-sauce-code-pro-nerd-font"

[nerd-font-jetbrains.macos]
check = "fc-list 2>/dev/null | grep -qi 'JetBrainsMono Nerd' || ls ~/Library/Fonts/JetBrainsMonoNerd* >/dev/null 2>&1"
cmd   = "brew install --cask font-jetbrains-mono-nerd-font"

[nerd-font-sauce.debian]
check  = "fc-list | grep -qi SauceCodePro"
action = "manual"
url    = "https://www.nerdfonts.com/font-downloads"

[nerd-font-jetbrains.debian]
check  = "fc-list | grep -qi 'JetBrainsMono Nerd'"
action = "manual"
url    = "https://www.nerdfonts.com/font-downloads"

# A general fallback row for nerd fonts on Linux:
[nerd-font-sauce.linux-other]
check  = "fc-list | grep -qi SauceCodePro"
action = "manual"
url    = "https://www.nerdfonts.com/font-downloads"

[nerd-font-jetbrains.linux-other]
check  = "fc-list | grep -qi 'JetBrainsMono Nerd'"
action = "manual"
url    = "https://www.nerdfonts.com/font-downloads"
